server {
    listen 80;
    server_name faceok.cn www.faceok.cn;

    root /var/www/faceok;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name 124.221.41.136;

    root /var/www/faceok;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /admin.html {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /admin.js {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /admin.css {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location ^~ /api/admin/ {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/admin/;
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name faceok.cn www.faceok.cn;

    root /var/www/faceok;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/faceok.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faceok.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /admin.html {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /admin.js {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /admin.css {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location ^~ /api/admin/ {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/admin/;
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
