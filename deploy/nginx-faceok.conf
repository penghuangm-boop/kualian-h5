server {
    listen 80;
    server_name faceok.cn www.faceok.cn 124.221.41.136;

    root /var/www/faceok;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /admin.html {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /admin.js {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /admin.css {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        try_files $uri =404;
    }

    location = /api/admin/config/app-config {
        limit_except GET {
            deny all;
        }
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/admin/config/app-config;
    }

    location ^~ /api/admin/ {
        auth_basic "FaceOK Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-faceok-admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/admin/;
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4174/api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
